<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Exercise 4 - Small Image</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="p-10 flex flex-col items-center bg-gray-50 min-h-screen">

    <h2 class="text-2xl font-bold mb-6 text-gray-800">Player Profile</h2>

    <img
      id="photo"
      src="https://picsum.photos/seed/old/300/200"
      alt="Old image"
      class="rounded-xl shadow-lg mb-3 border-4 border-white"
    />

    <p id="caption" class="text-gray-500 text-sm italic">This is the old image</p>

    <script>
      const mainImage = document.getElementById('photo');
      const captionText = document.getElementById('caption');

    
      mainImage.src = "https://i.pinimg.com/1200x/00/1c/9c/001c9c1b7685479791b75fc46fa2fb11.jpg";
      
   
      mainImage.style.width = "250px"; 
      mainImage.style.height = "150px";
      mainImage.style.objectFit = "cover"; 
      
      captionText.textContent = "✨ Profile Updated!";
      captionText.className = "text-blue-600 font-bold text-lg mt-2";
    </script>

  </body>
</html>
