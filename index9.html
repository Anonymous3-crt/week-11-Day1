<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Exercise 10 - The Grand Finale</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="p-10 max-w-md mx-auto bg-slate-50 min-h-screen flex flex-col justify-center">

    <h1 id="title" class="text-3xl font-bold text-gray-800 mb-3">
      Placeholder Title
    </h1>

    <p id="description" class="text-sm mb-4 text-gray-400 italic">
      This is a placeholder description that should be updated.
    </p>

    <img
      id="banner"
      src="https://picsum.photos/seed/before/600/200"
      alt="Before"
      class="rounded-xl shadow w-full mb-4 border-2 border-white"
    />

    <a id="link" href="#" class="text-blue-500 underline text-sm font-bold">
      Click here
    </a>

    <script>
   
      const title = document.getElementById('title');
      title.textContent = "DOM Manipulation is Powerful";

     
      const desc = document.getElementById('description');
      desc.textContent = "This content was set by JavaScript on page load.";
      desc.classList.remove("text-gray-400");
      desc.classList.add("text-gray-600", "not-italic");

      const banner = document.getElementById('banner');
      banner.src = "https://picsum.photos/seed/after/600/200";
      banner.alt = "After";

   
      const link = document.getElementById('link');
      link.href = "https://developer.mozilla.org";
      link.textContent = "Visit MDN Docs";

      document.body.style.transition = "opacity 1s";
      document.body.style.opacity = "1";
    </script>

  </body>
</html>
