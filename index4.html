<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Exercise 5 - Multi Selection</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="p-10 space-y-4 bg-gray-100">


    <div class="card bg-white rounded-xl shadow p-5 text-gray-700">Card One</div>
    <div class="card bg-white rounded-xl shadow p-5 text-gray-700">Card Two</div>
    <div class="card bg-white rounded-xl shadow p-5 text-gray-700">Card Three</div>

    <script>
     
      const allCards = document.querySelectorAll('.card');

      
      allCards.forEach((singleCard) => {
        
        
        singleCard.classList.add('ring-2', 'ring-blue-400');
        
      
        singleCard.style.transform = "scale(1.02)";
      });
    </script>

  </body>
</html>
