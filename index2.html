<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Direct Style Change</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="p-10 flex flex-col items-left justify-up min-h-screen bg-slate-50">

    <div
      id="colorBox"
      class="w-40 h-40 rounded-2xl bg-gray-300 shadow-md"
    ></div>

    <script>

      const box = document.getElementById('colorBox');

      
      box.style.backgroundColor = "royalblue";

      
    
      box.style.boxShadow = "0 10px 25px rgba(65, 105, 225, 0.5)";
      box.style.transform = "rotate(45deg)";
    </script>

  </body>
</html>
