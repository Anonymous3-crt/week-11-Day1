<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Exercise 6 - Profile Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="p-10 bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white rounded-2xl shadow-lg p-8 max-w-sm w-full text-center border border-gray-200">
      <div class="w-16 h-16 bg-blue-100 rounded-full mx-auto mb-4 flex items-center justify-center text-2xl">
        👤
      </div>
      <h2 id="name"  class="text-xl font-bold text-gray-800"></h2>
      <p  id="role"  class="text-blue-500 font-medium text-sm mt-1"></p>
      <p  id="email" class="text-gray-400 text-sm mt-1"></p>
    </div>

    <script>
   
      const person = {
        name:  "Charles Senator Solomon",
        role:  "Frontend Developer",
        email: "senatorsolomon735@gmail.com"
      };

      const nameEl = document.getElementById('name');
      const roleEl = document.getElementById('role');
      const emailEl = document.getElementById('email');

   
      nameEl.textContent = person.name;
      roleEl.textContent = person.role;
      emailEl.textContent = person.email;

      if (person.role.includes("Developer")) {
        const iconCircle = document.querySelector('.bg-blue-100');
        iconCircle.classList.replace('bg-blue-100', 'bg-green-100');
      }
    </script>

  </body>
</html>
